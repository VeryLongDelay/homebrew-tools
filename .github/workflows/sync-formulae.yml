name: Sync formulae

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - source_repo: gitig
            formula: gitig.rb

    steps:
      - name: Checkout homebrew-tools
        uses: actions/checkout@v6
        with:
          path: homebrew-tools

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.source_repo }}
          path: source

      - name: Copy formula
        run: |
          set -euo pipefail

          mkdir -p homebrew-tools/Formula
          cp "source/Formula/${{ matrix.formula }}" "homebrew-tools/Formula/${{ matrix.formula }}"

      - name: Commit changes
        working-directory: homebrew-tools
        run: |
          set -euo pipefail

          FORMULA="Formula/${{ matrix.formula }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          OLD_VERSION="new"

          if git cat-file -e HEAD:"$FORMULA" 2>/dev/null; then
              OLD_VERSION=$(
                  git show HEAD:"$FORMULA" \
                  | grep -E '^[[:space:]]*version[[:space:]]+"' \
                  | head -n1 \
                  | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/'
              )

              if [ -z "${OLD_VERSION:-}" ]; then
                  OLD_VERSION="unknown"
              fi
          fi

          NEW_VERSION=$(
              grep -E '^[[:space:]]*version[[:space:]]+"' "$FORMULA" \
              | head -n1 \
              | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/'
          )

          if [ -z "${NEW_VERSION:-}" ]; then
              NEW_VERSION="unknown"
          fi

          git add "$FORMULA"

          if git diff --cached --quiet; then
              echo "No changes for ${{ matrix.formula }}."
              exit 0
          fi

          git commit -m "Update: ${{ matrix.formula }} ${OLD_VERSION} --> ${NEW_VERSION}"
          git pull --rebase
          git push
